  if(p<DISP.STRONG_AT) return p;                 // mid/low untouched
  const n=cell.npmi!=null?cell.npmi:0;
  const t=Math.max(0,Math.min(1,n/DISP.NPMI_FULL));
  return DISP.HI_LOW+(DISP.HI_HIGH-DISP.HI_LOW)*t;
}
const cval=c=>c.posterior!=null?c.posterior:c.assoc;

/* One-line correlation summary from the cell's own stats, localised by lang. */
const DOT={en:["🔴","🟠","🟡","⚪","🔵","🔵"],zh:["🔴","🟠","🟡","⚪","🔵","🔵"],
  es:["🔴","🟠","🟡","⚪","🔵","🔵"],ko:["🔴","🟠","🟡","⚪","🔵","🔵"]};
function summaryText(cell,lang){
  const L=T[lang]||T.en, p=dispVal(cell), nAB=cell.nAB||0, lift=cell.lift, pmi=cell.pmi, exp=cell.expected;
  let k;
  if(p>=.97)k=0;else if(p>=.90)k=1;else if(p>=.65)k=2;else if(p>=.45)k=3;else if(p>=.25)k=4;else k=5;
  const parts=[`${DOT[lang][k]} ${L.tiers[k]}`];
  if(nAB>0){
    if(lang==="ko"){
      parts.push(`${L.sumCo}${fmt(nAB)}${L.sumPapers}`);
      if(exp!=null&&lift>0) parts.push(`${L.sumExp}${lift.toFixed(1)}${L.sumExpEnd} (exp ${exp.toFixed(1)})`);
    }else{
      parts.push(`${L.sumCo}${fmt(nAB)}${L.sumPapers}`);
      if(exp!=null&&lift>0) parts.push(`${lift.toFixed(1)}${L.sumExp}${exp.toFixed(1)}${L.sumExpEnd}`);
    }
    if(pmi!=null) parts.push(`${L.sumPmi}${pmi.toFixed(2)}${L.sumBits}`);
  }else{
    parts.push(L.sumIndirect);
  }
  return parts.join(" · ");
}

function GroundTip({cell,r,c,rect}){
  const ref=useRef();
  const [pos,setPos]=useState({top:rect.bottom+10,left:rect.left,ready:false});
  useLayoutEffect(()=>{
    const el=ref.current;if(!el)return;
    const w=el.offsetWidth,h=el.offsetHeight,vw=window.innerWidth,vh=window.innerHeight,gap=10;
    let top=rect.top-h-gap;                 // prefer just above the cell
    if(top<8) top=rect.bottom+gap;          // otherwise just below
    if(top+h>vh-8) top=Math.max(8,vh-8-h);
    let left=rect.cx-w/2;                    // horizontally centred on the cell
    left=Math.min(Math.max(left,8),vw-w-8);
    setPos({top,left,ready:true});
  },[rect.left,rect.top,rect.right,rect.bottom,rect.cx]);
  const prior=cell.prior!=null?cell.prior:0.5, post=cval(cell), shown=dispVal(cell);
  return(
    <div ref={ref} className="tip" style={{position:"fixed",top:pos.top,left:pos.left,visibility:pos.ready?"visible":"hidden"}}>
      <div className="tiphead">{r} <span>×</span> {c}</div>
      <div className="tipko">{summaryText(cell,LANG)}</div>
      <div className="tipchain">
        <div className="tpp"><span>{tr("prior")}</span><b>{pctI(prior)}</b></div>
        <div className="tarrow">⊗ LR {lrFmt(cell.lr)}</div>
        <div className="tpp"><span>{tr("assoc")}</span><b className="tpost">{pct(shown)}</b></div>
      </div>
      <div className="tipbar"><span className="tp-prior" style={{left:`${prior*100}%`}}/><span className="tp-post" style={{left:`${shown*100}%`}}/></div>
      <div className="tiprow"><span>{tr("comention")}</span><b>{fmt(cell.nAB)} / {cell.expected!=null?cell.expected.toFixed(1):"—"}</b></div>
      <div className="tiprow"><span>{tr("pmiLift")}</span><b>{cell.pmi!=null?cell.pmi.toFixed(2):"—"} bits · {cell.lift!=null?cell.lift.toFixed(1):"—"}×</b></div>

      <div className="tiphint">{tr("clickRead")}</div>
    </div>
  );
}

        <p><b>PMI → likelihood ratio → posterior.</b> Expected co-mentions by chance are E = n<sub>A</sub>n<sub>B</sub>/N; the <b>lift</b> n<sub>AB</sub>/E equals 2<sup>PMI</sup>. The observed count is turned into a Poisson log-likelihood ratio of an association model vs independence, tempered by a co-mention reliability weight, and used to Bayes-update a prior into the <b>posterior P(associated)</b> shown in every cell. The PubMedBERT semantic prior, when on, raises the prior for related-but-under-cited pairs (Swanson ABC). Hover any cell for the full chain.</p>
        <p><b>Reading results.</b> Two axes → ranked candidates for the third; three axes → the full matrix. A <span className="tag hypothesis" style={{fontSize:9}}>hypothesis</span> badge = both arms strong yet rarely co-mentioned. Curated CTD evidence adds a direction tag: <span className="dir up" style={{fontSize:9}}>▲ activates</span> / <span className="dir down" style={{fontSize:9}}>▼ suppresses</span>. Networks: WormBase · CTD · STRING · Reactome.</p>
      </div>}
    </div>
  );
}

          <button className="run" data-cursor="run" disabled={mode==="idle"||busy} onClick={analyze}>{busy?tr("computing"):mode==="matrix"?tr("runMatrix"):tr("run")}<span className="arrow">▸</span></button>
        </div>
      </div>

      <Spotlight spot={spot} ent={ent}/>

      {busy&&<div className="loading"><span className="spin"/>{tr("grounding1")}{ent.gene.length+ent.phenotype.length+ent.molecule.length}{tr("grounding2")}{source==="europepmc"?"Europe PMC":"PubMed"}{tr("grounding3")}</div>}
      {err&&<div className="errbox">{err}</div>}

      {result&&result.matrix&&(
        <section className="result">
          <div className="cohrow">
            <Dial v={result.matrix.coherence}/>
            <div className="cohlab"><span className="cohk">{tr("coherence")}</span><span className="cohd">{tr("cohDesc1")}{result.matrix.grounding==="pubmed"?"PubMed":"Europe PMC"}{tr("cohDesc2")}{result.matrix.source==="live"?"live":"demo"}</span></div>
          </div>
          <div className="hmlist">{result.matrix.heatmaps.map((hm,i)=><Heatmap key={i} hm={hm}/>)}</div>
          <div className="scalebar">
            <span>{tr("scaleLo")}</span><div className="scalegrad"/><span>{tr("scaleHi")}</span>
            <span className="scalecap">{tr("scaleCap")}</span>
          </div>
          {result.rank&&result.rank.rows&&result.rank.rows.length>0&&<RankView res={result.rank}/>}
        </section>
      )}

      <div className="examples">
        <span className="exlabel">{tr("presets")}</span>
        <div className="exrow" data-cursor="preset">{EXAMPLES.map((ex,i)=><button key={i} className={ex.weak?"exweak":""} onClick={()=>preset(ex)}>{ex.t}</button>)}</div>
      </div>

      <Methods/>
      <footer className="foot">CelegansBERT · Dohoon Kim · Bayesian enrichment grounded live in Europe PMC / PubMed · WormBase · CTD · STRING · Reactome</footer>
    </div>
  </>);
}
function Stat({n,l}){return(<div className="stat"><span className="statn">{fmt(n)}</span><span className="statl">{l}</span></div>)}
function Dial({v}){
  // 3D glossy orb gauge: conic progress ring + spherical shaded core + gloss highlight
  const deg=Math.round(v*360);
  const hi=v>.66?"#06B6D4":v>.4?"#7C3AED":"#DB2777";
  const hi2=v>.66?"#22D3EE":v>.4?"#A78BFA":"#F472B6";
  return(
    <div className="orb" style={{"--deg":deg+"deg","--c1":hi,"--c2":hi2}}>
      <div className="orb-ring"/>
      <div className="orb-core">
        <span className="orb-num">{pctI(v)}</span>
      </div>
      <div className="orb-gloss"/>
    </div>
  );
}

/* ───────── Spotlight: one most-cited paper per axis (below Run) ───────── */
function Spotlight({spot,ent}){
  const any=TYPES.some(t=>ent[t] && ent[t][0]);
  if(!any) return null;
  return(
    <div className="spotwrap" data-cursor="paper">
      <div className="spotlabel">{tr("spotlight")}</div>
      <div className="spotrow">
        {TYPES.map(t=>{
          const e=ent[t]&&ent[t][0]; if(!e) return null;
          const p=spot[t];
          return(
            <div key={t} className="spotcard" style={{"--c":COLOR[t]}}>
              <div className="spothead"><span className="spotdot"/><span className="spotaxis">{cap(t)}</span><span className="spotent">{e.label}</span></div>
              {p===undefined&&<div className="spotload"><span className="spin"/></div>}
              {p===null&&<div className="spotempty">—</div>}
              {p&&<a className="spotpaper" href={p.url||"#"} target="_blank" rel="noopener noreferrer">
                <div className="spottitle">{p.title||"(untitled)"}</div>
                <div className="spotmeta">{[p.journal,p.year].filter(Boolean).join(" · ")}{p.cited>0?` · ${fmt(p.cited)} ${tr("cites")}`:""}</div>
              </a>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ───────── Hero3D: animated C. elegans worm + AI/ML shapes behind title ───────── */
function Hero3D(){
  const ref=useRef();
  useEffect(()=>{
    const host=ref.current;
    if(!host||typeof THREE==="undefined") return;               // graceful if CDN blocked
    if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    let W=host.clientWidth||900, H=host.clientHeight||150, raf=0, disposed=false;
    const scene=new THREE.Scene();
    const cam=new THREE.PerspectiveCamera(45,W/H,0.1,100); cam.position.set(0,0,26);
    const rndr=new THREE.WebGLRenderer({alpha:true,antialias:true});
    rndr.setSize(W,H); rndr.setPixelRatio(Math.min(window.devicePixelRatio,2));
    host.appendChild(rndr.domElement);
    scene.add(new THREE.AmbientLight(0xffffff,0.85));
    const key=new THREE.PointLight(0x22d3ee,1.1,120); key.position.set(-14,10,20); scene.add(key);
    const fill=new THREE.PointLight(0xdb2777,0.9,120); fill.position.set(16,-8,18); scene.add(fill);

    // ── realistic C. elegans: tapered fusiform body + travelling undulatory wave ──
    const L=46, SEG=180, RADIAL=16;
    // body radius profile (0 = head, 1 = tail): blunt head, full mid-belly, long fine tail
    function wormR(u){
      const R=0.92;
      const head=Math.pow(Math.min(1,u/0.05),0.5);        // quick rounded head
      const tail=Math.pow(Math.min(1,(1-u)/0.42),1.15);   // long tapering tail to a point
      const belly=0.70+0.30*Math.sin(Math.PI*Math.min(1,Math.max(0,u)));
      return R*head*tail*belly;
    }
    // centreline of the animal: a sine wave that TRAVELS head→tail (undulatory swimming)
    function centreline(t){
      const pts=[],waves=1.85,amp=3.2;
      for(let i=0;i<SEG;i++){
        const s=i/(SEG-1);                                 // 0 head .. 1 tail
        const x=(s-0.5)*L;
        const env=Math.sin(Math.PI*Math.min(1,s*1.04));    // amplitude tapers at both ends
        const phase=2*Math.PI*waves*s - t*3.1;             // travelling wave
        const y=amp*env*Math.sin(phase) + 1.1*Math.sin(s*1.6+t*0.5);  // + slow body bend
        const z=1.0*env*Math.sin(phase+1.1)*0.55;
        pts.push(new THREE.Vector3(x,y,z));
      }
      return new THREE.CatmullRomCurve3(pts);
    }
    // build a tapered tube (variable radius) around a curve — TubeGeometry can't taper
    function wormGeom(curve){
      const fr=curve.computeFrenetFrames(SEG-1,false);
      const pos=[],nor=[],idx=[],P=new THREE.Vector3();
      for(let i=0;i<SEG;i++){
        const u=i/(SEG-1); curve.getPointAt(u,P);
        const Nn=fr.normals[i],Bn=fr.binormals[i],r=wormR(u);
        for(let j=0;j<=RADIAL;j++){
          const a=j/RADIAL*Math.PI*2, cx=Math.cos(a), sx=Math.sin(a);
          const nx=cx*Nn.x+sx*Bn.x, ny=cx*Nn.y+sx*Bn.y, nz=cx*Nn.z+sx*Bn.z;
          pos.push(P.x+r*nx,P.y+r*ny,P.z+r*nz); nor.push(nx,ny,nz);
        }
      }
      for(let i=1;i<SEG;i++)for(let j=1;j<=RADIAL;j++){
        const a=(RADIAL+1)*(i-1)+(j-1),b=(RADIAL+1)*i+(j-1),c=(RADIAL+1)*i+j,d=(RADIAL+1)*(i-1)+j;
        idx.push(a,b,d,b,c,d);
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
      g.setIndex(idx); return g;
    }
    const wormMat=new THREE.MeshStandardMaterial({color:0x7fe3f2,emissive:0x0e7490,emissiveIntensity:0.28,
      roughness:0.32,metalness:0.12,transparent:true,opacity:0.93,side:THREE.DoubleSide});
    let worm=new THREE.Mesh(wormGeom(centreline(0)),wormMat); scene.add(worm);
    // faint pharynx/gut line hint via a thin darker inner strand
    const gutMat=new THREE.MeshBasicMaterial({color:0x0891b2,transparent:true,opacity:0.28});
    let gut=new THREE.Mesh(new THREE.TubeGeometry(centreline(0),120,0.14,8,false),gutMat); scene.add(gut);

    // subtle AI / ML motifs drifting behind the worm
    function chip(text,color){
      const c=document.createElement("canvas");c.width=c.height=128;const g=c.getContext("2d");
      g.font="bold 60px 'Chakra Petch',sans-serif";g.textAlign="center";g.textBaseline="middle";
      g.fillStyle=color;g.fillText(text,64,68);
      const m=new THREE.Mesh(new THREE.PlaneGeometry(3.6,3.6),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c),transparent:true,opacity:0.75}));
      return m;
    }
    const ai=chip("AI","#7c3aed"), ml=chip("ML","#db2777");
    ai.position.set(-15,5,-3); ml.position.set(15,-4,-3); scene.add(ai); scene.add(ml);
    const shapes=[];
    const mk=(geo,color,pos,s)=>{const mm=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color,wireframe:true,transparent:true,opacity:0.32}));mm.position.set(...pos);mm.scale.setScalar(s);scene.add(mm);shapes.push(mm);return mm;};
    mk(new THREE.IcosahedronGeometry(2,0),0x22d3ee,[-11,-5,-4],0.9);
    mk(new THREE.OctahedronGeometry(2,0),0xdb2777,[10,6,-5],0.8);

    const clock=new THREE.Clock();
    function tick(){
      if(disposed)return;
      const el=clock.getElapsedTime();
      const cl=centreline(el);
      worm.geometry.dispose(); worm.geometry=wormGeom(cl);
      gut.geometry.dispose(); gut.geometry=new THREE.TubeGeometry(cl,120,0.13,8,false);
      // whole animal glides gently and yaws like it is exploring the plate
      worm.position.x=Math.sin(el*0.25)*3.2; gut.position.copy(worm.position);
      worm.rotation.z=Math.sin(el*0.3)*0.10; gut.rotation.z=worm.rotation.z;
      ai.rotation.z=Math.sin(el*0.6)*0.12; ai.position.y=5+Math.sin(el*0.8)*0.7;
      ml.rotation.z=Math.cos(el*0.5)*0.12; ml.position.y=-4+Math.cos(el*0.7)*0.7;
      shapes.forEach((s,i)=>{s.rotation.x+=0.003+i*0.001;s.rotation.y+=0.005+i*0.001;});
      scene.rotation.y=Math.sin(el*0.12)*0.08;
      rndr.render(scene,cam); raf=requestAnimationFrame(tick);
    }
    tick();
    const onResize=()=>{if(disposed||!host)return;W=host.clientWidth;H=host.clientHeight;cam.aspect=W/H;cam.updateProjectionMatrix();rndr.setSize(W,H);};
    window.addEventListener("resize",onResize);
    return()=>{disposed=true;cancelAnimationFrame(raf);window.removeEventListener("resize",onResize);try{rndr.dispose();host.removeChild(rndr.domElement);}catch(e){}};
  },[]);
  return <div ref={ref} className="hero3d" aria-hidden="true"/>;
}

/* ───────── WormCursor: a living C. elegans cursor with zone-reactive FX ───────── */
function WormCursor(){
  const cref=useRef();
  useEffect(()=>{
    if(window.matchMedia&&window.matchMedia("(pointer: coarse)").matches) return; // skip touch
    const cv=cref.current,ctx=cv.getContext("2d");
    let W=innerWidth,H=innerHeight,dpr=Math.min(devicePixelRatio||1,2);
    const resize=()=>{W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";ctx.setTransform(dpr,0,0,dpr,0,0);};
    resize();
    const ZONE={gene:["#06B6D4","#22D3EE"],phenotype:["#DB2777","#F472B6"],molecule:["#7C3AED","#A78BFA"],
      heat:["#EF3B2C","#FDAE61"],preset:["#10B981","#6EE7B7"],run:["#F59E0B","#FCD34D"],
      paper:["#2563EB","#60A5FA"],hero:["#06B6D4","#7C3AED"],default:["#0891B2","#22D3EE"]};
    const MODE={gene:{w:7,head:4.6,spk:.6},phenotype:{w:7.6,head:5.2,spk:.75},molecule:{w:7,head:4.6,spk:.6},
      heat:{w:8.6,head:5.6,spk:.95},preset:{w:5.6,head:4,spk:.5},run:{w:9.2,head:6.2,spk:1},
      paper:{w:6.6,head:4.4,spk:.6},hero:{w:8,head:5,spk:.85},default:{w:7,head:4.6,spk:.6}};
    const hexRGB=h=>{h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];};
    const N=26, pts=Array.from({length:N},()=>({x:W/2,y:H/2}));
    let tx=W/2,ty=H/2,px=tx,py=ty;
    let col=[8,145,178],colT=[8,145,178],col2=[34,211,238],col2T=[34,211,238];
    let mode="default", mfac={w:7,head:4.6,spk:.6}, mfacT={w:7,head:4.6,spk:.6};
    const sparks=[];
    const onMove=e=>{tx=e.clientX;ty=e.clientY;
      const el=document.elementFromPoint(tx,ty), z=el&&el.closest&&el.closest("[data-cursor]");
      const key=z?z.getAttribute("data-cursor"):"default";
      if(ZONE[key]){mode=key;colT=hexRGB(ZONE[key][0]);col2T=hexRGB(ZONE[key][1]);mfacT=MODE[key]||MODE.default;}
    };
    const onDown=e=>{for(let i=0;i<20;i++){const a=Math.PI*2*i/20,s=2+Math.random()*3.5;
      sparks.push({x:e.clientX,y:e.clientY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,r:2+Math.random()*2.4,c:[...col2T]});}};
    addEventListener("mousemove",onMove);addEventListener("mousedown",onDown);addEventListener("resize",resize);
    let raf=0;
    const frame=t=>{
      const hx=pts[0].x+(tx-pts[0].x)*0.35, hy=pts[0].y+(ty-pts[0].y)*0.35;
      const dx=hx-px,dy=hy-py,speed=Math.hypot(dx,dy);px=hx;py=hy;
      pts[0].x=hx;pts[0].y=hy;
      const ang=Math.atan2(dy,dx);
      for(let i=1;i<N;i++){const p=pts[i],pr=pts[i-1];
        p.x+=(pr.x-p.x)*0.55;p.y+=(pr.y-p.y)*0.55;
        const wob=Math.sin(t*0.008 - i*0.5)*1.7*Math.min(1,speed*0.14+0.22);
        p.x+=Math.cos(ang+Math.PI/2)*wob;p.y+=Math.sin(ang+Math.PI/2)*wob;}
      for(let k=0;k<3;k++){col[k]+=(colT[k]-col[k])*0.12;col2[k]+=(col2T[k]-col2[k])*0.12;}
      mfac.w+=(mfacT.w-mfac.w)*0.15;mfac.head+=(mfacT.head-mfac.head)*0.15;mfac.spk+=(mfacT.spk-mfac.spk)*0.15;
      ctx.clearRect(0,0,W,H);ctx.lineCap="round";ctx.lineJoin="round";
      ctx.save();ctx.shadowBlur=10;ctx.shadowColor=`rgba(${col2[0]|0},${col2[1]|0},${col2[2]|0},.6)`;
      for(let i=N-1;i>0;i--){const p=pts[i],pr=pts[i-1],tt=i/N;
        ctx.strokeStyle=`rgba(${col[0]|0},${col[1]|0},${col[2]|0},${(0.92-tt*0.55).toFixed(2)})`;
        ctx.lineWidth=(1-tt)*mfac.w+1.1;
        ctx.beginPath();ctx.moveTo(pr.x,pr.y);ctx.lineTo(p.x,p.y);ctx.stroke();}
      ctx.restore();
      ctx.save();ctx.shadowBlur=18;ctx.shadowColor=`rgb(${col2[0]|0},${col2[1]|0},${col2[2]|0})`;
      ctx.fillStyle=`rgb(${col2[0]|0},${col2[1]|0},${col2[2]|0})`;
      ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,mfac.head,0,7);ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.85)";ctx.beginPath();ctx.arc(pts[0].x-mfac.head*0.3,pts[0].y-mfac.head*0.3,mfac.head*0.32,0,7);ctx.fill();
      ctx.restore();
      if(speed>6&&Math.random()<mfac.spk){const tail=pts[N-1];
        sparks.push({x:tail.x,y:tail.y,vx:(Math.random()-.5)*1.6,vy:(Math.random()-.5)*1.6,life:1,r:1+Math.random()*1.7,c:[...col2]});}
      for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.02;s.life-=0.028;
        if(s.life<=0){sparks.splice(i,1);continue;}
        ctx.globalAlpha=Math.max(0,s.life);ctx.fillStyle=`rgb(${s.c[0]|0},${s.c[1]|0},${s.c[2]|0})`;
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();ctx.globalAlpha=1;}
      raf=requestAnimationFrame(frame);
    };
    raf=requestAnimationFrame(frame);
    document.body.classList.add("wormcur");
    return()=>{cancelAnimationFrame(raf);removeEventListener("mousemove",onMove);removeEventListener("mousedown",onDown);removeEventListener("resize",resize);document.body.classList.remove("wormcur");};
  },[]);
  return <canvas ref={cref} className="wormcanvas" aria-hidden="true"/>;
}

.wm-c{color:var(--ink)}

.wm-tag{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--pheno);margin-left:9px;transform:translateY(-16px);letter-spacing:1px}
.status{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
.pill .pdot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.pill.on{color:var(--gene);border-color:#7FD3E4;background:#ECFBFE;box-shadow:0 0 0 1px #7FD3E433,0 0 14px #22D3EE22}
.pill.off{color:var(--pheno);border-color:#F3B6D3;background:#FDF0F7}
.pill.wait{color:var(--faint)}
.pill.semantic{color:var(--mol);border-color:#C6B8F5;background:#F3EFFE;box-shadow:0 0 14px #A78BFA22}
.pill.muted{color:var(--faint)}
.tagline{position:relative;z-index:1;margin:52px 0 0;font-size:15px;color:var(--muted);max-width:660px;line-height:1.5}
.tagline b{color:var(--ink);font-weight:600}
.kbstrip{position:relative;z-index:1;display:flex;align-items:center;gap:26px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
.stat{display:flex;flex-direction:column;line-height:1.05}
.statn{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.5px}
.statl{font-size:11px;color:var(--muted);margin-top:3px}
.kbnote{font-size:12.5px;color:var(--muted);font-style:italic}
.srcs{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.src{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);border:1px solid var(--line);background:var(--panel);padding:3px 8px;border-radius:5px}

.controls{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:26px 0 12px;flex-wrap:wrap}
.ctitle{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.ctlset{display:flex;gap:8px;flex-wrap:wrap}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--surface)}
.seg button{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 13px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.12s}
.seg button.on{background:var(--ink);color:#fff;box-shadow:inset 0 0 0 1px #ffffff22}
.seg button:not(.on):hover{color:var(--ink)}

.inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.inputs{grid-template-columns:1fr}}
.field{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 16px 14px;position:relative;animation:fadeup .5s ease both;transition:box-shadow .2s,border-color .2s}
.field::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;background:var(--c);box-shadow:0 0 10px var(--c)}
.field:focus-within{border-color:color-mix(in srgb,var(--c) 50%,var(--line));box-shadow:0 0 0 1px color-mix(in srgb,var(--c) 30%,transparent),0 0 22px color-mix(in srgb,var(--c) 14%,transparent)}
.fhead{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-left:8px}
.fdot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 0 4px color-mix(in srgb,var(--c) 12%,transparent),0 0 8px var(--c)}
.ftitles{display:flex;flex-direction:column;line-height:1.1}
.flabel{font-size:13.5px;font-weight:600}
.fsub{font-size:10.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.fcount{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint)}
.chips{display:flex;flex-wrap:wrap;gap:6px;min-height:24px;margin-bottom:10px;padding-left:8px}
.chip{display:inline-flex;align-items:center;gap:6px;background:color-mix(in srgb,var(--c) 9%,white);border:1px solid color-mix(in srgb,var(--c) 32%,white);border-radius:7px;padding:4px 6px 4px 10px;font-size:13px;font-weight:500;color:color-mix(in srgb,var(--c) 55%,black);animation:fadeup .25s ease both}
.cx{background:none;border:none;color:color-mix(in srgb,var(--c) 55%,white);font-size:15px;cursor:pointer;padding:0;line-height:1}
.cx:hover{color:var(--c)}
.empty{font-size:11.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace}
.expand{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;margin:0 0 10px;font-size:11.5px;font-family:'IBM Plex Mono',monospace;padding:8px;border-radius:8px;border:1px dashed color-mix(in srgb,var(--c) 45%,white);background:color-mix(in srgb,var(--c) 6%,white);color:var(--c);cursor:pointer;transition:.15s}
.expand:hover:not(:disabled){background:color-mix(in srgb,var(--c) 13%,white);box-shadow:0 0 14px color-mix(in srgb,var(--c) 20%,transparent)}
.expand:disabled{opacity:.55;cursor:wait}
.inpwrap{position:relative;padding-left:8px}
.inp{width:100%;background:var(--panel);border:1px solid var(--line2);border-radius:8px;outline:none;color:var(--ink);font-size:13.5px;font-family:inherit;padding:9px 11px}
.inp:focus{border-color:color-mix(in srgb,var(--c) 50%,white);background:#fff;box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 12%,transparent)}
.inp::placeholder{color:#9AA3B4}
.ac{position:absolute;left:8px;right:0;top:100%;margin-top:6px;z-index:30;list-style:none;padding:5px;background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:0 18px 44px rgba(11,16,32,.16);max-height:260px;overflow:auto}
.ac li{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;cursor:pointer}
.ac li:hover{background:var(--panel)}
.acname{font-size:13.5px;font-weight:500}.acdesc{font-size:10.5px;color:var(--muted);font-style:italic}
.acid{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--faint);white-space:nowrap}

.modebar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:22px 0 4px;flex-wrap:wrap}
.modetext{font-size:13.5px;color:var(--muted)}.modetext b{color:var(--ink)}
.modebtns{display:flex;gap:9px;align-items:center}
.ghost{font-size:13px;padding:11px 17px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;font-family:inherit}
.ghost:hover{border-color:var(--muted);color:var(--ink)}
.run{display:inline-flex;align-items:center;gap:9px;font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:600;letter-spacing:.3px;padding:11px 22px;border-radius:10px;border:none;cursor:pointer;color:#fff;background:linear-gradient(100deg,var(--gene),var(--mol));box-shadow:0 3px 16px rgba(124,58,237,.28),0 0 22px rgba(6,182,212,.18)}
.run .arrow{transition:transform .2s}
.run:hover:not(:disabled) .arrow{transform:translateX(3px)}
.run:disabled{opacity:.4;cursor:not-allowed;background:#C2C9D6;box-shadow:none}
.loading{display:flex;align-items:center;gap:10px;margin-top:18px;font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
.errbox{margin-top:18px;font-size:13px;color:#BE185D;background:#FDF0F7;border:1px solid #F3B6D3;border-radius:11px;padding:13px 15px}

.result{margin-top:24px;animation:fadeup .5s ease both}
.cohrow{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.orb{position:relative;width:82px;height:82px;flex-shrink:0;transform-style:preserve-3d;animation:orbfloat 5s ease-in-out infinite}
@keyframes orbfloat{0%,100%{transform:translateY(0) rotateX(8deg) rotateZ(-2deg)}50%{transform:translateY(-4px) rotateX(12deg) rotateZ(2deg)}}
.orb-ring{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from -90deg,var(--c2) 0deg,var(--c1) var(--deg),rgba(150,160,180,.18) var(--deg),rgba(150,160,180,.12) 360deg);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 12px),#000 calc(100% - 11px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 12px),#000 calc(100% - 11px));
  filter:drop-shadow(0 3px 6px rgba(11,16,32,.28)) drop-shadow(0 0 10px var(--c1));
  transition:background .9s cubic-bezier(.2,.8,.2,1)}
.orb-core{position:absolute;inset:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 34% 28%,#ffffff 0%,#eef2f8 24%,#cdd6e4 62%,#aab6c9 100%);
  box-shadow:inset 0 -6px 12px rgba(11,16,32,.22),inset 0 5px 10px rgba(255,255,255,.9),0 4px 10px rgba(11,16,32,.18)}
.orb-num{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:19px;color:var(--c1);
  text-shadow:0 1px 0 #fff,0 0 8px color-mix(in srgb,var(--c1) 45%,transparent)}
.orb-gloss{position:absolute;left:20%;top:12%;width:44%;height:30%;border-radius:50%;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.9),rgba(255,255,255,0) 70%);filter:blur(1px)}
.cohlab{display:flex;flex-direction:column}
.cohk{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:16px}
.cohd{font-size:11.5px;color:var(--muted);margin-top:3px}
.hmlist{display:flex;flex-direction:column;gap:20px}
.hmwrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:17px 19px}
.hmhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px;flex-wrap:wrap;gap:8px}
.hmtitle{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:600}
.hmx{color:var(--faint);margin:0 8px;font-weight:400}
.hmmean{font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.hmgrid{overflow-x:auto;overflow-y:visible;padding-bottom:2px}
.hm{border-collapse:separate;border-spacing:4px}
.hm .corner{background:transparent}
.hm .colh{font-size:11px;font-weight:600;vertical-align:bottom;padding:0 2px 7px;text-align:center;max-width:118px}
.hm .colh span{display:inline-block;line-height:1.15}
.hm .rowh{font-size:12px;font-weight:600;text-align:right;padding-right:11px;white-space:nowrap}
.hm .cell{height:53px;text-align:center;cursor:pointer;position:relative;transition:transform .12s,filter .12s;
  clip-path:polygon(9px 0,calc(100% - 9px) 0,100% 9px,100% calc(100% - 9px),calc(100% - 9px) 100%,9px 100%,0 calc(100% - 9px),0 9px);
  filter:var(--gl,none)}
.hm .cell .cnum{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700;letter-spacing:.3px}
.hm .cell:hover{transform:scale(1.07);filter:var(--gl,none) brightness(1.05) saturate(1.08);z-index:2}
.hm .cell.active{box-shadow:inset 0 0 0 2.5px #0B1020;z-index:2}
.tip{position:fixed;z-index:60;background:#0B1020;color:#E6ECF5;border:1px solid #2A3350;border-radius:12px;padding:12px 13px;font-size:11.5px;min-width:230px;box-shadow:0 16px 44px rgba(0,0,0,.45),0 0 0 1px rgba(34,211,238,.12);pointer-events:none}
.tiphead{font-weight:600;margin-bottom:9px;font-size:12px;color:#fff}.tiphead span{color:#5A6478;margin:0 4px}
.tipko{font-size:11px;line-height:1.5;color:#B9C3D6;background:#131A2E;border:1px solid #2A3350;border-radius:8px;padding:7px 9px;margin-bottom:9px}
.tipchain{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.tpp{display:flex;flex-direction:column;line-height:1.2}.tpp span{font-size:9px;color:#8A93A6;text-transform:uppercase;letter-spacing:.5px}
.tpp b{font-family:'IBM Plex Mono',monospace;font-size:14px}
.tpost{color:#22D3EE;text-shadow:0 0 10px #22D3EE66}
.tarrow{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#A78BFA;text-align:center;white-space:nowrap}
.tipbar{position:relative;height:4px;background:linear-gradient(90deg,#DB2777,#334,#06B6D4);border-radius:3px;margin:2px 0 9px}
.tipbar span{position:absolute;top:50%;width:2px;height:11px;transform:translate(-50%,-50%)}
.tp-prior{background:#8A93A6}.tp-post{background:#22D3EE;box-shadow:0 0 6px #22D3EE}
.tiprow{display:flex;justify-content:space-between;gap:16px;padding:2px 0;color:#9AA3B4}
.tiprow b{color:#E6ECF5;font-family:'IBM Plex Mono',monospace}
.tiphint{margin-top:8px;padding-top:7px;border-top:1px solid #2A3350;font-size:10px;color:#22D3EE;text-align:right;letter-spacing:.3px}
.evbox{margin-top:14px;background:linear-gradient(180deg,#FBFDFF,#F3F7FB);border:1px solid var(--line);border-radius:12px;padding:14px 16px;animation:fadeup .3s ease both;box-shadow:0 0 0 1px rgba(34,211,238,.08),0 8px 26px rgba(11,16,32,.06)}
.evhead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.evtitle{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:600}
.evx{color:var(--faint);font-weight:400}
.evpost{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--gene);background:#ECFBFE;border:1px solid #A5E4F0;padding:2px 8px;border-radius:100px;box-shadow:0 0 10px rgba(6,182,212,.15)}
.evmeta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);font-weight:400;width:100%;margin-top:-2px}
.evko{font-size:12.5px;line-height:1.6;color:var(--ink);background:linear-gradient(90deg,#EFF4FF,#FDEEF1);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:12px}
.evclose{flex-shrink:0;background:none;border:1px solid var(--line);border-radius:7px;width:26px;height:26px;color:var(--muted);font-size:16px;cursor:pointer;line-height:1}
.evclose:hover{border-color:var(--pheno);color:var(--pheno)}
.evload{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);padding:8px 0}
.evempty{font-size:12.5px;color:var(--muted);line-height:1.6;padding:6px 0}
.evlist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;counter-reset:ev}
.evitem{counter-increment:ev;position:relative;padding-left:26px}
.evitem::before{content:counter(ev);position:absolute;left:0;top:1px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#fff;background:linear-gradient(135deg,var(--gene),var(--mol));width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 8px rgba(6,182,212,.3)}
.evi-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.evi-title{font-size:13.5px;font-weight:600;color:var(--ink);text-decoration:none;line-height:1.35}
.evi-title:hover{color:var(--gene);text-decoration:underline}
.evi-cite{flex-shrink:0;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mol);white-space:nowrap}
.evi-meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--faint);margin:3px 0 5px}
.evi-abs{font-size:12.5px;line-height:1.6;color:var(--muted)}
.scalebar{display:flex;align-items:center;gap:8px;margin:16px 0 4px;font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.scalegrad{width:200px;height:9px;border-radius:5px;background:linear-gradient(90deg,rgb(49,54,149),rgb(69,117,180),rgb(171,217,233),rgb(255,255,191),rgb(253,174,97),rgb(239,59,44),rgb(176,26,31))}
.scalecap{margin-left:8px;font-family:'Inter';font-style:italic;color:var(--faint)}

.rankbox{margin-top:26px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:19px}
.rankhead{font-size:14px;color:var(--muted);margin-bottom:15px}.rankhead b{color:var(--ink)}
.ranklist{display:flex;flex-direction:column;gap:8px}
.rrow{display:grid;grid-template-columns:30px 1fr 210px 58px;gap:15px;align-items:center;background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:11px 15px;transition:border-color .15s,box-shadow .15s}
.rrow:hover{border-color:color-mix(in srgb,var(--cyan) 40%,var(--line));box-shadow:0 0 16px rgba(6,182,212,.1)}
@media(max-width:820px){.rrow{grid-template-columns:24px 1fr 58px}.rmini{display:none}}
.rnum{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--faint);text-align:center}
.rname{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:100px;font-weight:600}
.tag.established{background:#ECFBFE;color:var(--gene)}.tag.hypothesis{background:#F3EFFE;color:var(--mol)}.tag.indirect{background:#EEF1F5;color:var(--muted)}
.dir{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:100px}
.dir.up{background:#FDE7F1;color:#DB2777}.dir.down{background:#E6F6FB;color:#0891B2}.dir.mixed{background:#F1EBFD;color:var(--mol)}
.rbar{height:7px;background:#E1E6EF;border-radius:5px;overflow:hidden}
.rbar span{display:block;height:100%;border-radius:5px;transition:width .8s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 8px currentColor}
.rmini{display:flex;flex-direction:column;gap:6px}
.arm .armbar{height:5px;background:#E1E6EF;border-radius:4px;overflow:hidden}
.arm .armbar span{display:block;height:100%;background:var(--faint)}
.armlab{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px}
.rscore{font-family:'Chakra Petch',sans-serif;font-size:17px;font-weight:700;text-align:right}

.examples{margin-top:28px}
.exlabel{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:1px}
.exrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.exrow button{font-size:12px;font-family:'IBM Plex Mono',monospace;padding:7px 12px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;transition:.15s}
.exrow button:hover{border-color:var(--cyan);color:var(--gene);background:#ECFBFE;box-shadow:0 0 14px rgba(6,182,212,.15)}
.exrow button.exweak{border-style:dashed;color:var(--muted);border-color:#C3CBD6}
.exrow button.exweak:hover{border-color:#2E6BE6;color:#2E6BE6;background:#EEF3FF;box-shadow:0 0 14px rgba(46,107,230,.14)}
.methods{margin-top:28px;border-top:1px solid var(--line);padding-top:16px}
.mtoggle{background:none;border:none;color:var(--muted);font-size:13px;font-family:'IBM Plex Mono',monospace;cursor:pointer;padding:2px 0}
.mbody{margin-top:10px;font-size:13px;line-height:1.75;color:var(--muted);max-width:780px}
.mbody b{color:var(--ink)}.mbody p{margin:0 0 11px}
.foot{margin-top:34px;padding-top:16px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint);font-family:'IBM Plex Mono',monospace}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.wlead{stroke-dashoffset:0}}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
