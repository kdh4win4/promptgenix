<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PromptGenix</title>
  <script>
    // GitHub Pages SPA redirect: convert path to hash
    var path = window.location.pathname;
    var page = path.replace(/^\//, '').replace(/\.html$/, '');
    if (page && page !== 'index') {
      window.location.replace('/#' + page);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
